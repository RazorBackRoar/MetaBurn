name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    runs-on: macos-latest
    steps:
      - name: Checkout MetaBurn
        uses: actions/checkout@v7

      - name: Build
        run: swift build

      - name: Test
        run: swift test
